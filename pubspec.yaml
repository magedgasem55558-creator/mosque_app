name: mosque_app
description: "تطبيق المسجد الشامل - المصحف، القبلة، والخدمات التعليمية"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.10.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # --- الصوتيات وتنزيل الملفات ---
  audioplayers: ^6.0.0
  just_audio: ^0.9.39
  just_audio_background: ^0.0.1-beta.17
  dio: ^5.4.0
  path_provider: ^2.1.2

  # --- قاعدة البيانات والشبكات ---
  supabase_flutter: ^2.0.0
  http: ^1.2.1
  cached_network_image: ^3.3.1

  # --- خدمات Firebase الإشعارات ---
  firebase_core: ^3.1.1
  cloud_firestore: ^5.0.2
  firebase_auth: ^5.1.2
  firebase_messaging: ^15.0.3
  flutter_local_notifications: ^17.1.2

  # --- الموقع، القبلة، وأوقات الصلاة ---
  geolocator: ^14.0.2
  flutter_compass: ^0.8.0
  permission_handler: ^11.3.1
  adhan: 2.0.0+1
  flutter_map: ^6.1.0
  latlong2: ^0.9.0

  # --- أدوات واجهة المستخدم وإدارة الحالة ---
  cupertino_icons: ^1.0.8
  fl_chart: ^0.66.0
  provider: ^6.1.1

  # --- التاريخ والوقت والتخزين ---
  intl: ^0.20.2
  timeago: ^3.7.1
  timezone: ^0.9.4
  shared_preferences: ^2.2.2
  url_launcher: ^6.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
